# Docker Compose for Stock Data Intelligence Dashboard
version: '3.8'

services:
  stock-dashboard:
    build: .
    container_name: stock-intel-dashboard
    ports:
      - "8000:8000"
    volumes:
      - ./stock_data.db:/app/stock_data.db
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
